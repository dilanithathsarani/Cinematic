<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic - Discover Movies</title>
    <meta name="description" content="Cinematic - Discover popular movies, ratings, cast and more. Your premium movie discovery experience.">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Ambient Cinematic Background -->
    <div id="ambientBackdrop" class="ambient-backdrop"></div>
    <div class="ambient-overlay"></div>

    <!-- ===================== HOME VIEW ===================== -->
    <div id="homeView">
        <div class="container-fluid px-4 px-md-5 py-4">

            <!-- Navbar Header -->
            <nav class="app-navbar d-flex justify-content-between align-items-center mb-5">
                <!-- Logo -->
                <div class="logo-container d-flex align-items-center gap-2" onclick="navigateToHome()">
                    <div class="logo-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect>
                            <line x1="7" y1="2" x2="7" y2="22"></line>
                            <line x1="17" y1="2" x2="17" y2="22"></line>
                            <line x1="2" y1="12" x2="22" y2="12"></line>
                            <line x1="2" y1="7" x2="7" y2="7"></line>
                            <line x1="2" y1="17" x2="7" y2="17"></line>
                            <line x1="17" y1="17" x2="22" y2="17"></line>
                            <line x1="17" y1="7" x2="22" y2="7"></line>
                        </svg>
                    </div>
                    <span class="logo-text">Cine<span>matic</span></span>
                </div>

                <!-- Search Bar -->
                <div class="nav-search-wrap">
                    <div class="search-bar-group">
                        <span class="input-group-text bg-transparent border-0">
                            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                        </span>
                        <input type="text" id="searchInput" class="search-input" placeholder="Search movies..." aria-label="Search movie">
                        <button class="btn-search" id="searchButton" onclick="findMovie()">Search</button>
                    </div>
                </div>

                <!-- Favorites Button -->
                <button class="nav-fav-btn" onclick="showFavoritesTab()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                    </svg>
                    Favorites
                    <span class="fav-count-badge" id="favCountBadge">0</span>
                </button>
            </nav>

            <!-- Hero Section (shows before any search) -->
            <div id="heroSection" class="hero-section text-center mb-5">
                <h2 class="hero-heading">Discover Your Next <span>Favorite Film</span></h2>
                <p class="hero-sub">Explore critically acclaimed movies, ratings, and detailed cinematic insights.</p>
                <div class="d-flex flex-wrap gap-2 justify-content-center mt-4">
                    <span class="trending-chip" onclick="quickSearch('Inception')">Inception</span>
                    <span class="trending-chip" onclick="quickSearch('Interstellar')">Interstellar</span>
                    <span class="trending-chip" onclick="quickSearch('The Dark Knight')">The Dark Knight</span>
                    <span class="trending-chip" onclick="quickSearch('Dune: Part Two')">Dune: Part Two</span>
                    <span class="trending-chip" onclick="quickSearch('Oppenheimer')">Oppenheimer</span>
                </div>
            </div>

            <!-- Section Header with Tabs -->
            <div class="section-header d-flex justify-content-between align-items-center mb-4">
                <div class="section-tabs">
                    <button class="section-tab active" id="tabPopular" onclick="switchTab('popular')">Popular Now</button>
                    <button class="section-tab" id="tabFavorites" onclick="switchTab('favorites')">
                        My Favorites
                        <span class="tab-badge" id="tabFavBadge">0</span>
                    </button>
                </div>
                <span class="results-label" id="sectionMeta"></span>
            </div>

            <!-- Main Grid (Popular or Favorites) -->
            <div id="moviesGrid" class="movies-grid">
                <!-- Populated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- ===================== DETAILS PAGE VIEW ===================== -->
    <div id="detailsView" class="d-none">
        <!-- Full-page details backdrop -->
        <div id="detailsContent">
            <!-- Navigation Bar for details page -->
            <div class="details-navbar">
                <div class="container-fluid px-4 px-md-5">
                    <div class="d-flex align-items-center justify-content-between py-3">
                        <button class="back-btn" onclick="navigateToHome()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="19" y1="12" x2="5" y2="12"></line>
                                <polyline points="12 19 5 12 12 5"></polyline>
                            </svg>
                            Back to Movies
                        </button>
                        <div class="logo-container d-flex align-items-center gap-2" onclick="navigateToHome()">
                            <div class="logo-icon logo-icon-sm">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect>
                                    <line x1="7" y1="2" x2="7" y2="22"></line>
                                    <line x1="17" y1="2" x2="17" y2="22"></line>
                                    <line x1="2" y1="12" x2="22" y2="12"></line>
                                </svg>
                            </div>
                            <span class="logo-text logo-text-sm">Cine<span>matic</span></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Details Body -->
            <div class="container-fluid px-4 px-md-5 py-4">
                <div id="detailsBody">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
