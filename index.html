<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic - Discover Movies & Shows</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Custom CSS Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Ambient Blur Background -->
    <div id="ambientBackdrop" class="ambient-backdrop"></div>
    <div class="ambient-overlay"></div>

    <div class="container app-container py-4">
        <!-- Header Section -->
        <header class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-3 py-3 mb-4 border-bottom border-secondary border-opacity-25">
            <!-- Logo Branding -->
            <div class="logo-container d-flex align-items-center gap-2" onclick="resetToHome()">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect>
                        <line x1="7" y1="2" x2="7" y2="22"></line>
                        <line x1="17" y1="2" x2="17" y2="22"></line>
                        <line x1="2" y1="12" x2="22" y2="12"></line>
                        <line x1="2" y1="7" x2="7" y2="7"></line>
                        <line x1="2" y1="17" x2="7" y2="17"></line>
                        <line x1="17" y1="17" x2="22" y2="17"></line>
                        <line x1="17" y1="7" x2="22" y2="7"></line>
                    </svg>
                </div>
                <div class="logo-text">Cine<span>matic</span></div>
            </div>

            <!-- Search Area -->
            <div class="search-wrapper">
                <div class="search-bar">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="searchInput" placeholder="Search movies or TV shows..." autocomplete="off">
                    <button id="clearSearchBtn" class="clear-btn" title="Clear search">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                    <button id="searchButton" class="search-btn" onclick="performSearch()" title="Search">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                            <polyline points="12 5 19 12 12 19"></polyline>
                        </svg>
                    </button>
                </div>
                <!-- Autocomplete suggestions dropdown -->
                <div id="suggestionsBox" class="suggestions-box"></div>
            </div>

            <!-- Navigation Actions -->
            <div class="nav-actions">
                <button id="favToggleBtn" class="fav-toggle-btn" data-bs-toggle="offcanvas" data-bs-target="#favoritesSidebar" aria-controls="favoritesSidebar">
                    <svg viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                    </svg>
                    Favorites
                    <span id="favCount" class="fav-count">0</span>
                </button>
            </div>
        </header>

        <!-- Main Feed / Search results -->
        <main>
            <div class="section-header d-flex justify-content-between align-items-center mb-4">
                <h2 id="sectionTitle" class="section-title mb-0">Popular Cinema</h2>
                <span id="resultsCount" class="results-count"></span>
            </div>
            
            <!-- Bootstrap Grid Layout for Movie Cards -->
            <div id="moviesGrid" class="row row-cols-2 row-cols-sm-3 row-cols-md-4 row-cols-lg-5 g-4 py-2">
                <!-- Loaded dynamically by JS -->
            </div>
        </main>
    </div>

    <!-- Favorites Drawer Sidebar (Bootstrap Offcanvas) -->
    <div class="offcanvas offcanvas-end custom-offcanvas" tabindex="-1" id="favoritesSidebar" aria-labelledby="favoritesSidebarLabel">
        <div class="offcanvas-header border-bottom border-secondary border-opacity-50">
            <h5 class="offcanvas-title d-flex align-items-center gap-2" id="favoritesSidebarLabel">
                <svg viewBox="0 0 24 24" width="22" height="22" style="fill: var(--gold); stroke: var(--gold);"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                My Favorites
            </h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
            <div id="favoritesList" class="d-flex flex-column gap-3">
                <!-- Populated dynamically by JS -->
            </div>
        </div>
    </div>

    <!-- Detailed Movie Modal (Bootstrap Modal) -->
    <div class="modal fade" id="movieModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content custom-modal-content">
                <div class="modal-header border-0 pb-0 justify-content-end">
                    <button type="button" class="btn-close btn-close-white close-modal-btn-override" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body pt-0 px-4 px-md-5 pb-5">
                    <div id="modalHero" class="row modal-hero-layout gap-4 gap-md-0">
                        <!-- Loaded dynamically -->
                    </div>
                    <div id="modalScores" class="modal-scores-layout mt-4">
                        <!-- Loaded dynamically -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle (with Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <!-- Custom JavaScript -->
    <script src="script.js"></script>
</body>
</html>
